<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WJ TASK</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --text: #e8e8f0;
    --muted: #7070888;
    --muted2: #50505e;
    --accent: #7c6dfa;
    --accent2: #fa6d9a;
    --green: #5de8a0;
    --orange: #faae3a;
    --red: #fa5757;
    --yellow: #f5e142;
    --mono: 'DM Mono', monospace;
    --sans: 'Zen Kaku Gothic New', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* === HEADER === */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,17,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  /* === TABS === */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 12px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    font-family: var(--mono);
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted2);
    transition: all 0.18s;
    letter-spacing: 0.3px;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* === VIEWS === */
  .view { display: none; padding: 16px; }
  .view.active { display: block; }

  /* === TODAY SECTION === */
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted2);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .today-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: transform 0.15s, opacity 0.15s;
    animation: slideIn 0.25s ease both;
  }
  .today-card.done { opacity: 0.45; }
  .today-card:active { transform: scale(0.98); }

  .card-inner {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px;
  }

  .rank-badge {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
  }

  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 6px;
    word-break: break-all;
  }
  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 5px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .badge-imp-high { background: rgba(250,87,87,0.18); color: var(--red); }
  .badge-imp-mid { background: rgba(250,174,58,0.18); color: var(--orange); }
  .badge-imp-low { background: rgba(93,232,160,0.18); color: var(--green); }
  .badge-urg-high { background: rgba(250,109,154,0.15); color: var(--accent2); }
  .badge-urg-mid { background: rgba(124,109,250,0.15); color: var(--accent); }
  .badge-urg-low { background: rgba(255,255,255,0.08); color: var(--muted2); }

  .deadline-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted2);
  }
  .deadline-text.near { color: var(--red); }
  .deadline-text.today { color: var(--orange); }

  .check-btn {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
    color: transparent;
    font-size: 13px;
  }
  .check-btn.done {
    background: var(--green);
    border-color: var(--green);
    color: var(--bg);
  }

  .delete-btn {
    flex-shrink: 0;
    width: 26px; height: 26px;
    background: transparent;
    border: none;
    color: var(--muted2);
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    transition: color 0.15s;
  }
  .delete-btn:active { color: var(--red); }

  /* === ADD FORM === */
  .add-fab {
    position: fixed;
    bottom: 24px; right: 20px;
    z-index: 200;
    width: 56px; height: 56px;
    border-radius: 16px;
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(124,109,250,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .add-fab:active { transform: scale(0.93); box-shadow: 0 4px 16px rgba(124,109,250,0.3); }

  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-width: 540px;
    animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-size: 17px;
    font-weight: 900;
    margin-bottom: 18px;
  }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted2);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .field input[type="text"],
  .field input[type="date"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    padding: 11px 13px;
    outline: none;
    transition: border-color 0.18s;
  }
  .field input:focus { border-color: var(--accent); }

  .seg-group {
    display: flex;
    gap: 6px;
  }
  .seg {
    flex: 1;
    padding: 9px 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted2);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
  }
  .seg.sel-high { background: rgba(250,87,87,0.18); border-color: var(--red); color: var(--red); }
  .seg.sel-mid  { background: rgba(250,174,58,0.18); border-color: var(--orange); color: var(--orange); }
  .seg.sel-low  { background: rgba(93,232,160,0.18); border-color: var(--green); color: var(--green); }
  .seg.sel-high2 { background: rgba(250,109,154,0.15); border-color: var(--accent2); color: var(--accent2); }
  .seg.sel-mid2  { background: rgba(124,109,250,0.15); border-color: var(--accent); color: var(--accent); }
  .seg.sel-low2  { background: rgba(255,255,255,0.08); border-color: var(--muted2); color: var(--muted2); }

  .submit-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    margin-top: 20px;
    transition: opacity 0.18s;
  }
  .submit-btn:active { opacity: 0.8; }

  /* === MATRIX === */
  .matrix-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 8px;
    margin-top: 4px;
  }

  .quadrant {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    min-height: 120px;
  }
  .q1 { border-color: rgba(250,87,87,0.4); background: rgba(250,87,87,0.05); }
  .q2 { border-color: rgba(250,174,58,0.4); background: rgba(250,174,58,0.04); }
  .q3 { border-color: rgba(124,109,250,0.3); background: rgba(124,109,250,0.04); }
  .q4 { border-color: rgba(255,255,255,0.08); background: transparent; }

  .q-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .q1 .q-label { color: var(--red); }
  .q2 .q-label { color: var(--orange); }
  .q3 .q-label { color: var(--accent); }
  .q4 .q-label { color: var(--muted2); }

  .q-sub {
    font-size: 9px;
    color: var(--muted2);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .q-item {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    line-height: 1.35;
    display: flex; align-items: center; gap: 5px;
  }
  .q-item:last-child { border-bottom: none; }
  .q-item.done-item { text-decoration: line-through; opacity: 0.4; }
  .q-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* === LIST VIEW === */
  .sort-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .sort-btn {
    flex-shrink: 0;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted2);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn.active {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* === EMPTY STATE === */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted2);
    font-size: 13px;
    line-height: 1.8;
  }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  /* === ANIMATIONS === */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  /* === AXIS LABELS === */
  .matrix-axis {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 4px;
  }
  .axis-label {
    text-align: center;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted2);
    text-transform: uppercase;
    padding: 4px;
  }

  .matrix-y-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted2);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 2px;
  }

  /* scrollbar padding at bottom */
  .view { padding-bottom: 90px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">WJ <span>TASK</span></div>
  <div style="font-family:var(--mono);font-size:11px;color:var(--muted2)" id="task-count-header"></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('today')">⚡ 今日やる</button>
  <button class="tab" onclick="switchTab('list')">📋 一覧</button>
  <button class="tab" onclick="switchTab('matrix')">🎯 マトリクス</button>
</div>

<!-- VIEW: TODAY -->
<div class="view active" id="view-today">
  <div style="margin-bottom:16px">
    <div class="section-label">今日のおすすめ実行順</div>
    <div id="today-list"></div>
  </div>
</div>

<!-- VIEW: LIST -->
<div class="view" id="view-list">
  <div class="sort-bar">
    <span style="font-family:var(--mono);font-size:10px;color:var(--muted2);flex-shrink:0">並び替え：</span>
    <button class="sort-btn active" onclick="setSort('score')" id="sort-score">おすすめ順</button>
    <button class="sort-btn" onclick="setSort('deadline')" id="sort-deadline">期限順</button>
    <button class="sort-btn" onclick="setSort('importance')" id="sort-importance">重要度順</button>
  </div>
  <div id="all-list"></div>
</div>

<!-- VIEW: MATRIX -->
<div class="view" id="view-matrix">
  <div class="section-label">重要度 × 緊急度</div>
  <div class="matrix-axis">
    <div class="axis-label" style="color:var(--accent2)">▲ 緊急度：高</div>
    <div class="axis-label" style="color:var(--muted2)">▼ 緊急度：低</div>
  </div>
  <div class="matrix-grid">
    <div class="quadrant q1">
      <div class="q-label">🔥 今すぐやる</div>
      <div class="q-sub">重要 × 緊急</div>
      <div id="q1-items"></div>
    </div>
    <div class="quadrant q2">
      <div class="q-label">📅 計画する</div>
      <div class="q-sub">重要 × 余裕あり</div>
      <div id="q2-items"></div>
    </div>
    <div class="quadrant q3">
      <div class="q-label">⚡ 素早く片付ける</div>
      <div class="q-sub">急ぎ × 重要度低</div>
      <div id="q3-items"></div>
    </div>
    <div class="quadrant q4">
      <div class="q-label">🗑 後回し</div>
      <div class="q-sub">余裕あり × 重要度低</div>
      <div id="q4-items"></div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="add-fab" onclick="openModal()">＋</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">新しいタスク</div>

    <div class="field">
      <label>タスク内容</label>
      <input type="text" id="inp-title" placeholder="例：報告書を提出する" maxlength="60">
    </div>

    <div class="field">
      <label>重要度</label>
      <div class="seg-group" id="seg-imp">
        <button class="seg" onclick="selectSeg('imp','high',this)">🔴 高</button>
        <button class="seg" onclick="selectSeg('imp','mid',this)">🟡 中</button>
        <button class="seg" onclick="selectSeg('imp','low',this)">🟢 低</button>
      </div>
    </div>

    <div class="field">
      <label>緊急度</label>
      <div class="seg-group" id="seg-urg">
        <button class="seg" onclick="selectSeg('urg','high',this)">🔥 急ぎ</button>
        <button class="seg" onclick="selectSeg('urg','mid',this)">📌 普通</button>
        <button class="seg" onclick="selectSeg('urg','low',this)">🕐 余裕</button>
      </div>
    </div>

    <div class="field">
      <label>期限（任意）</label>
      <input type="date" id="inp-date">
    </div>

    <button class="submit-btn" onclick="addTask()">追加する →</button>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks_v2') || '[]');
  let selectedImp = null;
  let selectedUrg = null;
  let currentSort = 'score';

  function save() {
    localStorage.setItem('tasks_v2', JSON.stringify(tasks));
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  }

  // === MODAL ===
  function openModal() {
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('inp-title').focus();
    // set today as default date
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('inp-date').value = '';
    selectedImp = null;
    selectedUrg = null;
    document.querySelectorAll('.seg').forEach(s => {
      s.className = 'seg';
    });
    document.getElementById('inp-title').value = '';
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function selectSeg(type, val, el) {
    const group = document.getElementById('seg-' + type);
    group.querySelectorAll('.seg').forEach(s => s.className = 'seg');
    if (type === 'imp') {
      selectedImp = val;
      const cls = val === 'high' ? 'sel-high' : val === 'mid' ? 'sel-mid' : 'sel-low';
      el.classList.add(cls);
    } else {
      selectedUrg = val;
      const cls = val === 'high' ? 'sel-high2' : val === 'mid' ? 'sel-mid2' : 'sel-low2';
      el.classList.add(cls);
    }
  }

  function addTask() {
    const title = document.getElementById('inp-title').value.trim();
    if (!title) { document.getElementById('inp-title').focus(); return; }
    if (!selectedImp) { alert('重要度を選んでください'); return; }
    if (!selectedUrg) { alert('緊急度を選んでください'); return; }

    const deadline = document.getElementById('inp-date').value || null;
    tasks.push({
      id: genId(),
      title,
      importance: selectedImp,
      urgency: selectedUrg,
      deadline,
      done: false,
      created: Date.now()
    });
    save();
    closeModal();
    renderAll();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); renderAll(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    renderAll();
  }

  // === SCORING ===
  function impScore(v) { return v === 'high' ? 3 : v === 'mid' ? 2 : 1; }
  function urgScore(v) { return v === 'high' ? 3 : v === 'mid' ? 2 : 1; }

  function deadlineScore(deadline) {
    if (!deadline) return 0;
    const today = new Date(); today.setHours(0,0,0,0);
    const dl = new Date(deadline);
    const diff = Math.floor((dl - today) / 86400000);
    if (diff < 0) return 4;   // overdue
    if (diff === 0) return 3; // today
    if (diff <= 2) return 2;  // within 2 days
    if (diff <= 7) return 1;  // within a week
    return 0;
  }

  function taskScore(t) {
    return impScore(t.importance) * 2 + urgScore(t.urgency) * 2 + deadlineScore(t.deadline) * 3;
  }

  function sortedTasks() {
    const active = tasks.filter(t => !t.done);
    const done = tasks.filter(t => t.done);
    if (currentSort === 'score') {
      active.sort((a,b) => taskScore(b) - taskScore(a));
    } else if (currentSort === 'deadline') {
      active.sort((a,b) => {
        if (!a.deadline && !b.deadline) return 0;
        if (!a.deadline) return 1;
        if (!b.deadline) return -1;
        return a.deadline.localeCompare(b.deadline);
      });
    } else if (currentSort === 'importance') {
      active.sort((a,b) => impScore(b.importance) - impScore(a.importance) || urgScore(b.urgency) - urgScore(a.urgency));
    }
    return [...active, ...done];
  }

  // === DEADLINE DISPLAY ===
  function deadlineInfo(deadline) {
    if (!deadline) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const dl = new Date(deadline);
    const diff = Math.floor((dl - today) / 86400000);
    let cls = 'deadline-text';
    let txt = '';
    if (diff < 0) { cls += ' near'; txt = `期限超過 ${Math.abs(diff)}日前`; }
    else if (diff === 0) { cls += ' today'; txt = '📅 今日が期限'; }
    else if (diff === 1) { cls += ' near'; txt = '明日が期限'; }
    else if (diff <= 3) { cls += ' near'; txt = `あと ${diff}日`; }
    else { txt = `あと ${diff}日`; }
    return { cls, txt };
  }

  // === BADGE HTML ===
  function impBadge(v) {
    const map = { high: ['badge-imp-high','重要度：高'], mid: ['badge-imp-mid','重要度：中'], low: ['badge-imp-low','重要度：低'] };
    return `<span class="badge ${map[v][0]}">${map[v][1]}</span>`;
  }
  function urgBadge(v) {
    const map = { high: ['badge-urg-high','緊急'], mid: ['badge-urg-mid','普通'], low: ['badge-urg-low','余裕'] };
    return `<span class="badge ${map[v][0]}">${map[v][1]}</span>`;
  }

  // === RANK BADGE ===
  function rankBadge(rank) {
    const colors = ['#fa5757','#faae3a','#7c6dfa','#5de8a0','#7c7c9a'];
    const bg = colors[Math.min(rank, colors.length-1)];
    return `<div class="rank-badge" style="background:${bg}22;color:${bg}">${rank+1}</div>`;
  }

  // === CARD HTML ===
  function cardHTML(t, rank = null) {
    const dl = deadlineInfo(t.deadline);
    return `
      <div class="today-card ${t.done ? 'done' : ''}" id="card-${t.id}">
        <div class="card-inner">
          ${rank !== null ? rankBadge(rank) : ''}
          <div class="card-body">
            <div class="card-title">${escHtml(t.title)}</div>
            <div class="card-meta">
              ${impBadge(t.importance)}
              ${urgBadge(t.urgency)}
              ${dl ? `<span class="${dl.cls}">${dl.txt}</span>` : ''}
            </div>
          </div>
          <button class="check-btn ${t.done ? 'done' : ''}" onclick="toggleDone('${t.id}')">✓</button>
          <button class="delete-btn" onclick="deleteTask('${t.id}')">✕</button>
        </div>
      </div>
    `;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // === RENDER TODAY ===
  function renderToday() {
    const el = document.getElementById('today-list');
    const sorted = tasks
      .filter(t => !t.done)
      .sort((a,b) => taskScore(b) - taskScore(a));
    const done = tasks.filter(t => t.done);

    if (sorted.length === 0 && done.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">✨</div>タスクがありません<br>右下の ＋ から追加しよう</div>`;
      return;
    }

    let html = sorted.map((t, i) => cardHTML(t, i)).join('');
    if (done.length > 0) {
      html += `<div class="section-label" style="margin-top:20px;margin-bottom:10px">完了済み (${done.length})</div>`;
      html += done.map(t => cardHTML(t)).join('');
    }
    el.innerHTML = html;
  }

  // === RENDER LIST ===
  function renderList() {
    const el = document.getElementById('all-list');
    const sorted = sortedTasks();
    if (sorted.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>タスクがありません</div>`;
      return;
    }
    el.innerHTML = sorted.map(t => cardHTML(t)).join('');
  }

  // === RENDER MATRIX ===
  function renderMatrix() {
    const qs = { q1:[], q2:[], q3:[], q4:[] };
    tasks.forEach(t => {
      const imp = t.importance;
      const urg = t.urgency;
      const isHighImp = imp === 'high' || imp === 'mid';
      const isHighUrg = urg === 'high' || urg === 'mid';
      if (isHighImp && isHighUrg) qs.q1.push(t);
      else if (isHighImp && !isHighUrg) qs.q2.push(t);
      else if (!isHighImp && isHighUrg) qs.q3.push(t);
      else qs.q4.push(t);
    });

    const dotColor = { high: 'var(--red)', mid: 'var(--orange)', low: 'var(--green)' };

    ['q1','q2','q3','q4'].forEach(q => {
      const el = document.getElementById(q + '-items');
      if (qs[q].length === 0) {
        el.innerHTML = `<div style="font-size:11px;color:var(--muted2);padding:4px 0">なし</div>`;
        return;
      }
      el.innerHTML = qs[q].map(t => `
        <div class="q-item ${t.done ? 'done-item' : ''}">
          <div class="q-dot" style="background:${dotColor[t.importance]}"></div>
          <span>${escHtml(t.title)}</span>
        </div>
      `).join('');
    });
  }

  // === HEADER COUNT ===
  function renderHeaderCount() {
    const active = tasks.filter(t => !t.done).length;
    const total = tasks.length;
    document.getElementById('task-count-header').textContent = `${active} / ${total}`;
  }

  function renderAll() {
    renderToday();
    renderList();
    renderMatrix();
    renderHeaderCount();
  }

  // === TABS ===
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const idx = ['today','list','matrix'].indexOf(tab);
    document.querySelectorAll('.tab')[idx].classList.add('active');
    document.getElementById('view-' + tab).classList.add('active');
  }

  // === SORT ===
  function setSort(type) {
    currentSort = type;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('sort-' + type).classList.add('active');
    renderList();
  }

  // === INIT ===
  renderAll();
</script>
</body>
</html>
